<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fff7f1" />
  <title>Bank App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" class="app-shell" aria-live="polite"></main>
  <script src="schema.js"></script>
  <script src="tasks.js"></script>
  <script src="logger.js"></script>
  <script>
    const P2_PID_KEY = "bbdc_p2_participantId";
    const P2_SESSION_KEY = "bbdc_p2_sessionCount";
    ensureIdentity = function () {
      const p2 = safeGetLocalStorage(P2_PID_KEY);
      const legacy = safeGetLocalStorage("participantId");
      const participantId = p2 || legacy || memoryParticipantId || makeParticipantId();
      memoryParticipantId = participantId;
      safeSetLocalStorage(P2_PID_KEY, participantId);
      safeSetLocalStorage("participantId", participantId);
      return { uid: null, participantId, identitySource: p2 ? "localStorage_p2_returning" : (legacy ? "localStorage_legacy_migrated_to_p2" : "fresh_minted") };
    };
    getNextSessionIndex = function () {
      const count = Math.max(Number(safeGetLocalStorage(P2_SESSION_KEY) || 0), memorySessionCount) + 1;
      memorySessionCount = count;
      safeSetLocalStorage(P2_SESSION_KEY, String(count));
      return count;
    };
  </script>
  <script type="module" src="firebase.js"></script>
  <script src="app.js"></script>
</body>
</html>
